<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - BrainVerse</title>

<link rel="icon" type="image/png" href="brainverse_icon.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#ff9a3c,#ff6a00);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* tło logo */
body::before{
    content:"";
    position:fixed;
    width:400px;
    height:400px;
    background:url("brainverse_icon.png") no-repeat center;
    background-size:contain;
    opacity:0.08;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    pointer-events:none;
}

.card{
    background:white;
    width:420px;
    padding:40px;
    border-radius:25px;
    box-shadow:0 20px 50px rgba(0,0,0,0.25);
    text-align:center;
}

h1{
    margin:0;
    font-size:80px;
    color:#ff6a00;
}

h2{
    margin-top:5px;
    color:#333;
}

p{
    color:#666;
}

/* LOGIN BUTTON (NIE ZMIENIONE) */
.login-btn {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    background:#ff6a00;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.2s;
    text-decoration:none;
    display:block;
}

.login-btn:hover {
    background:#e85d00;
}

/* 🔥 TWÓJ ORYGINALNY PRZYCISK GRY */
.orange-btn {
    display: inline-block;
    width: 100%;
    margin-top: 10px;
    background: linear-gradient(45deg, #ff4500, #ff8c00);
    color: white !important;
    padding: 12px;
    text-decoration: none;
    font-weight: 800;
    font-size: 14px;
    border-radius: 30px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    box-shadow: 0 0 12px rgba(255, 140, 0, 0.4);
    transition: all 0.2s ease-in-out;
    white-space: nowrap;
}

.orange-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(255, 140, 0, 0.7);
    background: linear-gradient(45deg, #ff8c00, #ffae42);
}

.small{
    font-size:13px;
    color:#888;
    margin-top:10px;
}
</style>

</head>

<body>

<div class="card">

    <h1>404</h1>
    <h2>Strona nie istnieje</h2>

    <p>Żądana strona nie jest dostępna. Mogła zostać usunięta, przeniesiona lub wpisano nieprawidłowy adres.</p>

    <!-- LOGIN (bez zmian) -->
    <a class="login-btn" href="https://brainverse.pl">Wróć na stronę główną</a>

    <!-- TWÓJ PREMIUM BUTTON -->
    <a class="orange-btn" href="https://brainverse.pl/gry/">PRZEJDŹ DO GIER</a>

    <div class="small">
        BrainVerse system error: PAGE_NOT_FOUND
    </div>

</div>

</body>
</html>

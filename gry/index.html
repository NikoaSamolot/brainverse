<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainVerse Gry</title>

<link rel="icon" type="image/png" href="bvg.png">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f111a;
    color: white;
}

/* HEADER */
header {
    background: #1b1f2a;
    padding: 16px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}

/* SEARCH */
#searchBar {
    width: 100%;
    padding: 12px;
    border: none;
    outline: none;
    background: #151826;
    color: white;
    font-size: 16px;
    box-sizing: border-box;
}

/* LAYOUT */
#layout {
    display: flex;
}

/* SIDEBAR */
#sidebar {
    width: 220px;
    background: #151826;
    min-height: calc(100vh - 100px);
    padding: 10px;
    box-sizing: border-box;
}

/* TAG BUTTONS (checkbox style) */
.cat {
    background: #22263a;
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 8px;
    cursor: pointer;
    user-select: none;
    transition: 0.15s;
}

.cat:hover {
    background: #2f3552;
}

.cat.active {
    background: #3b4266;
    outline: 2px solid #5c6cff;
}

/* MAIN */
#main {
    flex: 1;
    padding: 20px;
}

/* GRID */
#list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 15px;
}

/* CARD */
.card {
    background: #1a1f2e;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 120px;
    object-fit: cover;
}

.card h3 {
    margin: 10px;
}
</style>
</head>

<body>

<header>
    <img src="bvg.png" style="height:160px; vertical-align:middle; margin-right:10px;">
    BrainVerse Games
</header>

<input id="searchBar" placeholder="🔍 Szukaj gry..." oninput="render()">

<div id="layout">

<!-- TAGI -->
<div id="sidebar">

    <div class="cat active" onclick="toggleTag('all', this)">Wszystkie</div>

    <div class="cat" onclick="toggleTag('horror', this)">Horror</div>
    <div class="cat" onclick="toggleTag('akcja', this)">Akcja</div>
    <div class="cat" onclick="toggleTag('quiz', this)">Quizy</div>
    <div class="cat" onclick="toggleTag('logic', this)">Logiczne</div>
    <div class="cat" onclick="toggleTag('reflex', this)">Zręcznościowe</div>
    <div class="cat" onclick="toggleTag('sandbox', this)">Sandbox</div>
    <div class="cat" onclick="toggleTag('survival', this)">Survival</div>
    <div class="cat" onclick="toggleTag('lore', this)">Fabularne</div>
    <div class="cat" onclick="toggleTag('fps', this)">First-Person Shooter</div>
    <div class="cat" onclick="toggleTag('3d', this)">3D</div>
    <div class="cat" onclick="toggleTag('2d', this)">2D</div>
    <div class="cat" onclick="toggleTag('arcade', this)">Arcade</div>
    <div class="cat" onclick="toggleTag('platformer', this)">Platformer</div>
    <div class="cat" onclick="toggleTag('rogue', this)">Rogue-Like</div>

</div>

<!-- MAIN -->
<div id="main">
    <div id="list"></div>
</div>

</div>

<script>

const games = [
{
    id:"carrot-apocalypse",
    title:"Carrot Apocalypse",
    tags:["akcja","survival","lore","2d"],
    image:"carrotap.jpg",
    url:"https://brainverse.pl/gry/carrot-apocalypse/"
},
{
    id:"quizy-1",
    title:"Quizy 1",
    tags:["quiz","2d","logic"],
    image:"quizy1.jpg",
    url:"https://brainverse.pl/gry/quizy1/"
},
{
    id:"quizy-2",
    title:"Quizy 2",
    tags:["quiz","2d","logic"],
    image:"quizy2.jpg",
    url:"https://brainverse.pl/gry/quizy2/"
},
{
    id:"laczenie",
    title:"Łączenie",
    tags:["logic", "2d"],
    image:"laczenie.jpg",
    url:"https://brainverse.pl/gry/laczenie/"
},
{
    id:"zgadnij-liczbe",
    title:"Zgadnij Liczbę",
    tags:["logic","2d"],
    image:"zgadnijliczbe.jpg",
    url:"https://brainverse.pl/gry/Zgadnij-liczbe/"
},
{
    id:"pi-challenge",
    title:"π Memory Challenge 1000",
    tags:["logic","quiz","2d"],
    image:"pi1000.jpg",
    url:"https://brainverse.pl/gry/Pi-Challenge/"
},
{
    id:"quiz-protocol",
    title:"The Quiz Protocol",
    tags:["horror","lore","2d"],
    image:"quizprot.png",
    url:"https://brainverse.pl/gry/the-quiz-protocol/"
},
{
    id:"iron-shot",
    title:"IronShot",
    tags:["akcja","fps","3d","arcade","rogue"],
    image:"ironshot.jpg",
    url:"https://brainverse.pl/gry/ironshot/"
},
{
    id:"voxel-lab",
    title:"Voxel Lab",
    tags:["sandbox","3d"],
    image:"vl.png",
    url:"https://brainverse.pl/gry/voxel-lab/"
},
{
    id:"reaction-circles",
    title:"Reaction Circles",
    tags:["reflex","2d","arcade"],
    image:"rc.png",
    url:"https://brainverse.pl/gry/reaction-circles/"
},
{
    id:"dont-get-orange",
    title:"Don't Get Orange! Demo",
    tags:["reflex","akcja","2d","arcade","platformer"],
    image:"dgo.png",
    url:"https://brainverse.pl/gry/dont-get-orange/"
}
];

let activeTags = new Set();

function toggleTag(tag, el) {

    if (tag === "all") {
        activeTags.clear();
        document.querySelectorAll(".cat").forEach(c => c.classList.remove("active"));
        el.classList.add("active");
        render();
        return;
    }

    document.querySelector(".cat").classList.remove("active"); // remove "all"

    if (activeTags.has(tag)) {
        activeTags.delete(tag);
        el.classList.remove("active");
    } else {
        activeTags.add(tag);
        el.classList.add("active");
    }

    render();
}

/* AND FILTER SYSTEM */
function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    const search = document.getElementById("searchBar").value.toLowerCase();

    games.forEach(g => {

        // SEARCH
        if (!g.title.toLowerCase().includes(search)) return;

        // AND TAG FILTER
        if (activeTags.size > 0) {
            const hasAll = [...activeTags].every(tag =>
                g.tags.includes(tag)
            );
            if (!hasAll) return;
        }

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <img src="${g.image}">
            <h3>${g.title}</h3>
        `;

        div.onclick = () => window.location.href = g.url;

        list.appendChild(div);
    });
}

render();

</script>

</body>
</html>

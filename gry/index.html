<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainVerse Gry</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f111a;
    color: white;
}

header {
    background: #1b1f2a;
    padding: 16px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}

#layout {
    display: flex;
}

#sidebar {
    width: 220px;
    background: #151826;
    height: calc(100vh - 60px);
    padding: 10px;
    box-sizing: border-box;
}

.cat {
    background: #22263a;
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 8px;
    cursor: pointer;
}

.cat:hover {
    background: #2f3552;
}

#main {
    flex: 1;
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 15px;
}

.card {
    background: #1a1f2e;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 120px;
    object-fit: cover;
}

.card h3 {
    margin: 10px;
}

#gameView {
    display: none;
}

iframe {
    width: 100%;
    height: 500px;
    border: none;
    border-radius: 12px;
    margin-top: 10px;
}

button {
    margin-top: 10px;
    margin-right: 10px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #4c6fff;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #3a56d6;
}
</style>
</head>

<body>

<header>🎮 BrainVerse Games</header>

<div id="layout">

<!-- KATEGORIE -->
<div id="sidebar">
    <div class="cat" onclick="setCat('all')">Wszystkie</div>
    <div class="cat" onclick="setCat('horror')">Horror</div>
    <div class="cat" onclick="setCat('akcja')">Akcja</div>
    <div class="cat" onclick="setCat('quiz')">Quizy</div>
    <div class="cat" onclick="setCat('logic')">Gry Logiczne</div>
</div>

<!-- MAIN -->
<div id="main">

<div id="list" class="grid"></div>

<div id="gameView">
    <h2 id="title"></h2>
    <p id="desc"></p>

    <iframe id="frame"></iframe>

    <div id="buttons"></div>

    <button onclick="back()">Powrót</button>
</div>

</div>
</div>

<script>

/* =========================
   GRY
========================= */
const games = [
{
    id: "carrot-apocalypse",
    title: "Carrot Apocalypse",
    category: "akcja",
    image: "carrotap.jpg",
    description: "You are a Carrot in a farmland, escape the zombie apocalypse.",
    embed: "https://brainverse.pl/carrotapocalypse/",
    download: "https://gamejolt.com/games/carrot/1029450"
},
{
    id: "quizy-1",
    title: "Quizy 1",
    category: "quiz",
    image: "quizy1.jpg",
    description: "Pierwsza część z serii quizy.",
    embed: "https://brainverse.pl/quizy1/",
    download: ""
},
{
    id: "quizy-2",
    title: "Quizy 2",
    category: "quiz",
    image: "quizy2.jpg",
    description: "Druga część z serii quizy.",
    embed: "https://brainverse.pl/quizy2/",
    download: ""
},
{
    id: "laczenie",
    title: "Łączenie",
    category: "logic",
    image: "laczenie.jpg",
    description: "Gra logiczna w której łaczysz elementy, aby tworzyć nowe.",
    embed: "https://brainverse.pl/laczenie/",
    download: ""
},
{
    id: "zgadnij-liczbe",
    title: "Zgadnij Liczbę",
    category: "logic",
    image: "zgadnijliczbe.jpg",
    description: "Odgadnij liczbę od 1 do 100",
    embed: "https://brainverse.pl/Zgadnijliczbe/",
    download: ""
},
{
    id: "pi-challenge",
    title: "π Memory Challenge 1000",
    category: "logic",
    image: "pi1000.jpg",
    description: "Gra w zapamiętywanie liczby pi.",
    embed: "https://brainverse.pl/PiChallenge/",
    download: ""
},
{
    id: "quiz-protocol",
    title: "The Quiz Protocol",
    category: "horror",
    image: "quizprot.png",
    description: "Horror quiz z wieloma zakończeniami.",
    embed: "https://brainverse.pl/thequizprotocol/",
    download: "https://play.google.com/store/apps/details?id=pl.nikoa.quizprotocol"
},
{
    id: "iron-shot",
    title: "IronShot",
    category: "akcja",
    image: "ironshot.jpg",
    description: "FPS rogue-like.",
    embed: "https://brainverse.pl/ironshot/",
    download: ""
}
];

let currentCat = "all";

/* =========================
   RENDER
========================= */
function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    games.forEach(g => {
        if (currentCat !== "all" && g.category !== currentCat) return;

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <img src="${g.image}">
            <h3>${g.title}</h3>
        `;

        div.onclick = () => openGame(g.id);
        list.appendChild(div);
    });
}

/* =========================
   CATEGORY
========================= */
function setCat(c) {
    currentCat = c;
    render();
}

/* =========================
   OPEN GAME (NAPRAWIONE)
========================= */
function openGame(id) {
    const g = games.find(x => x.id === id);

    document.getElementById("list").style.display = "none";
    document.getElementById("gameView").style.display = "block";

    document.getElementById("title").innerText = g.title;
    document.getElementById("desc").innerText = g.description;

    const frame = document.getElementById("frame");
    const buttons = document.getElementById("buttons");

    buttons.innerHTML = "";
    frame.src = "";
    frame.style.display = "none";

    // GRA ONLINE
    if (g.embed && g.embed.trim() !== "") {
        const playBtn = document.createElement("button");
        playBtn.innerText = "🎮 Graj online";
        playBtn.onclick = () => {
            frame.src = g.embed;
            frame.style.display = "block";
        };
        buttons.appendChild(playBtn);
    }

    // POBIERANIE
    if (g.download && g.download.trim() !== "") {
        const dlBtn = document.createElement("button");
        dlBtn.innerText = "⬇ Pobierz / Otwórz";
        dlBtn.onclick = () => {
            window.open(g.download, "_blank");
        };
        buttons.appendChild(dlBtn);
    }

    // brak obu
    if ((!g.embed || g.embed.trim() === "") &&
        (!g.download || g.download.trim() === "")) {

        const info = document.createElement("p");
        info.innerText = "Brak dostępnej wersji gry.";
        buttons.appendChild(info);
    }
}

/* =========================
   BACK
========================= */
function back() {
    document.getElementById("list").style.display = "grid";
    document.getElementById("gameView").style.display = "none";
    document.getElementById("frame").src = "";
}

/* START */
render();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gra Łączenie</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        h1 {
            margin-bottom: 10px;
        }

        #instructions {
            margin-bottom: 20px;
        }

        #elements, #crafted {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 10px 0;
        }

        .element {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-color: #fff;
            border: 2px solid #ccc;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .element:hover {
            transform: scale(1.1);
        }

        #crafted {
            border-top: 2px solid #ddd;
            padding-top: 10px;
        }

        #counter {
            margin-top: 10px;
            font-weight: bold;
        }

        #achievement {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: gold;
            color: black;
            font-weight: bold;
            border-radius: 5px;
            display: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        #achievement.visible {
            display: block;
        }

        #resetButton {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #f44336;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            border: none;
            transition: background-color 0.2s;
        }

        #resetButton:hover {
            background-color: #d32f2f;
        }
    </style>
</head>
<body>
    <h1>Gra Tworzenia Elementów</h1>
    <div id="instructions">
        Kliknij dwa elementy, aby je połączyć i stworzyć nowe!
    </div>
    <div id="elements">
        <div class="element" data-element="woda">Woda</div>
        <div class="element" data-element="ziemia">Ziemia</div>
        <div class="element" data-element="ogień">Ogień</div>
        <div class="element" data-element="powietrze">Powietrze</div>
    </div>
    <div id="crafted">
        <!-- Nowe elementy pojawią się tutaj -->
    </div>
    <div id="counter">
        Odkryto elementy: <span id="discovered">0</span>/<span id="total">16</span>
    </div>
    <div id="achievement">
        Osiągnięcie: Odkryto wszystkie elementy!
    </div>
    <button id="resetButton">Zresetuj grę</button>

    <script>
        const elements = document.querySelectorAll('.element');
        const crafted = document.getElementById('crafted');
        const discoveredCounter = document.getElementById('discovered');
        const totalCounter = document.getElementById('total');
        const achievement = document.getElementById('achievement');
        const resetButton = document.getElementById('resetButton');

        // Zasady tworzenia
        const craftingRecipes = {
            'woda+ziemia': 'Błoto',
            'ogień+powietrze': 'Dym',
            'woda+ogień': 'Para',
            'ziemia+powietrze': 'Pył',
            'błoto+ogień': 'Glina',
            'para+powietrze': 'Chmura',
            'dym+ziemia': 'Węgiel',
            'pył+powietrze': 'Piasek',
            'woda+glina': 'Ceramika',
            'para+glina': 'Boczek',
            'ogień+piasek': 'Szkło',
            'chmura+powietrze': 'Burza',
            'glina+woda': 'Glinka',
            'ceramika+ogień': 'Piec',
            'dym+powietrze': 'Pustynia',
            'błoto+woda': 'Ziemia',
        };

        // Wszystkie elementy do odkrycia
        const allElements = new Set([
            'woda', 'ziemia', 'ogień', 'powietrze', 'błoto', 'dym', 'para', 'pył', 'glina', 'ceramika',
            'chmura', 'węgiel', 'piasek', 'pustynia', 'kamień', 'burza',
        ]);

        // Zapisane odkrycia
        const savedDiscoveredElements = JSON.parse(localStorage.getItem('discoveredElements')) || [];
        const discoveredElements = new Set(savedDiscoveredElements);

        // Zaktualizuj licznik odkrytych elementów
        discoveredCounter.textContent = discoveredElements.size;
        totalCounter.textContent = allElements.size;

        // Dodaj już odkryte elementy do ekranu
        savedDiscoveredElements.forEach(element => {
            if (!['woda', 'ziemia', 'ogień', 'powietrze'].includes(element)) {
                const newDiv = document.createElement('div');
                newDiv.className = 'element';
                newDiv.innerText = element.charAt(0).toUpperCase() + element.slice(1);
                newDiv.dataset.element = element;
                newDiv.addEventListener('click', handleElementClick);
                crafted.appendChild(newDiv);
            }
        });

        // Zaznacz odkrycie wszystkich elementów
        if (discoveredElements.size === allElements.size) {
            achievement.classList.add('visible');
        }

        let firstSelectedElement = null;

        // Obsługa kliknięcia elementu
        function handleElementClick(e) {
            const clickedElement = e.target.dataset.element;

            if (!firstSelectedElement) {
                // Zapisz pierwszy wybrany element
                firstSelectedElement = clickedElement;
                e.target.style.borderColor = 'blue';
            } else {
                // Połącz z drugim elementem
                const combinedKey = `${firstSelectedElement}+${clickedElement}`;
                const reverseKey = `${clickedElement}+${firstSelectedElement}`;
                const newItem = craftingRecipes[combinedKey] || craftingRecipes[reverseKey];

                // Resetuj styl zaznaczenia
                document.querySelector(`[data-element="${firstSelectedElement}"]`).style.borderColor = '#ccc';
                firstSelectedElement = null;

                if (newItem) {
                    const newElementKey = newItem.toLowerCase();
                    if (!discoveredElements.has(newElementKey)) {
                        discoveredElements.add(newElementKey);
                        saveDiscoveredElements();
                        updateCounter();

                        const newDiv = document.createElement('div');
                        newDiv.className = 'element';
                        newDiv.innerText = newItem;
                        newDiv.dataset.element = newElementKey;
                        newDiv.addEventListener('click', handleElementClick);
                        crafted.appendChild(newDiv);
                    } else {
                        alert(`${newItem} już istnieje!`);
                    }
                } else {
                    alert('Nie można połączyć tych elementów!');
                }
            }
        }

        // Funkcja aktualizująca licznik
        function updateCounter() {
            discoveredCounter.textContent = discoveredElements.size;
            if (discoveredElements.size === allElements.size) {
                achievement.classList.add('visible');
            }
        }

        // Funkcja zapisywania odkrytych elementów do localStorage
        function saveDiscoveredElements() {
            localStorage.setItem('discoveredElements', JSON.stringify([...discoveredElements]));
        }

        // Funkcja resetująca grę
        function resetGame() {
            // Usuwamy zapisane elementy z localStorage
            localStorage.removeItem('discoveredElements');

            // Przywracamy domyślne elementy
            discoveredElements.clear();
            discoveredElements.add('woda');
            discoveredElements.add('ziemia');
            discoveredElements.add('ogień');
            discoveredElements.add('powietrze');

            // Zaktualizuj widok i licznik
            discoveredCounter.textContent = discoveredElements.size;
            crafted.innerHTML = '';
            achievement.classList.remove('visible');

            // Ponownie dodaj podstawowe elementy do sekcji
            elements.forEach(element => {
                element.style.borderColor = '#ccc'; // Reset stylu
            });
        }

        // Obsługa przycisku resetowania gry
        resetButton.addEventListener('click', resetGame);

        // Dodaj obsługę kliknięcia do każdego elementu
        elements.forEach(element => {
            element.addEventListener('click', handleElementClick);
        });
    </script>
</body>
</html>

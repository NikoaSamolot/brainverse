<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gra Tworzenia Elementów</title>

<style>
body {
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    background-color: #f4f4f9;
}

h1 { margin-bottom: 10px; }

#instructions { margin-bottom: 20px; }

#elements, #crafted {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin: 10px 0;
}

.element {
    width: 100px;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: #fff;
    border: 2px solid #ccc;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    transition: transform 0.2s;
    user-select: none;
}

.element:hover { transform: scale(1.1); }

#crafted {
    border-top: 2px solid #ddd;
    padding-top: 10px;
}

#counter {
    margin-top: 10px;
    font-weight: bold;
}

#achievement {
    margin-top: 20px;
    padding: 10px 20px;
    background: gold;
    color: black;
    font-weight: bold;
    border-radius: 5px;
    display: none;
}

#achievement.visible { display: block; }

#resetButton {
    margin-top: 20px;
    padding: 10px 20px;
    background: #f44336;
    color: white;
    font-weight: bold;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Gra Tworzenia Elementów</h1>

<div id="instructions">
Kliknij dwa elementy, aby je połączyć.
</div>

<div id="elements">
    <div class="element" data-element="woda">Woda</div>
    <div class="element" data-element="ziemia">Ziemia</div>
    <div class="element" data-element="ogień">Ogień</div>
    <div class="element" data-element="powietrze">Powietrze</div>
</div>

<div id="crafted"></div>

<div id="counter">
Odkryto: <span id="discovered">4</span>/<span id="total">20</span>
</div>

<div id="achievement">Osiągnięcie: Wszystkie elementy odkryte!</div>

<button id="resetButton">Zresetuj grę</button>

<script>
const elements = document.querySelectorAll('.element');
const crafted = document.getElementById('crafted');
const discoveredCounter = document.getElementById('discovered');
const totalCounter = document.getElementById('total');
const achievement = document.getElementById('achievement');
const resetButton = document.getElementById('resetButton');

const craftingRecipes = {
    'woda+ziemia': 'Błoto',
    'ogień+powietrze': 'Dym',
    'woda+ogień': 'Energia',
    'ziemia+powietrze': 'Pył',
    'błoto+ogień': 'Glina',
    'woda+powietrze': 'Chmura',
    'dym+ziemia': 'Węgiel',
    'pył+powietrze': 'Piasek',
    'woda+glina': 'Ceramika',
    'ogień+piasek': 'Szkło',
    'chmura+powietrze': 'Burza',
    'glina+ogień': 'Piec',
    'błoto+woda': 'Bagno',
    'ogień+ziemia': 'Lawa',
    'woda+lawa': 'Para',
    'bagno+energia': 'Życie',
};

const allElements = new Set([
    'woda','ziemia','ogień','powietrze',
    'błoto','dym','energia','pył','glina','chmura',
    'węgiel','piasek','ceramika','szkło','burza',
    'piec','bagno','lawa','para','życie'
]);

const BASE = ['woda','ziemia','ogień','powietrze'];

let discoveredElements = new Set(
    JSON.parse(localStorage.getItem('discoveredElements')) || BASE
);

let selected = null;

function updateUI() {
    discoveredCounter.textContent = discoveredElements.size;

    if (discoveredElements.size === allElements.size) {
        achievement.classList.add('visible');
    }
}

function save() {
    localStorage.setItem(
        'discoveredElements',
        JSON.stringify([...discoveredElements])
    );
}

function createElement(name) {
    const div = document.createElement('div');
    div.className = 'element';
    div.innerText = name.charAt(0).toUpperCase() + name.slice(1);
    div.dataset.element = name;
    div.addEventListener('click', handleClick);
    return div;
}

function handleClick(e) {
    const el = e.currentTarget.dataset.element;

    if (!selected) {
        selected = { name: el, node: e.currentTarget };
        e.currentTarget.style.borderColor = 'blue';
        return;
    }

    if (selected.name === el) {
        selected.node.style.borderColor = '#ccc';
        selected = null;
        return;
    }

    const key = `${selected.name}+${el}`;
    const reverse = `${el}+${selected.name}`;
    const result = craftingRecipes[key] || craftingRecipes[reverse];

    selected.node.style.borderColor = '#ccc';
    selected = null;

    if (!result) {
        alert('Nie można połączyć!');
        return;
    }

    const keyResult = result.toLowerCase();

    if (discoveredElements.has(keyResult)) {
        alert('Już odkryte!');
        return;
    }

    discoveredElements.add(keyResult);
    save();
    updateUI();

    crafted.appendChild(createElement(keyResult));
}

function resetGame() {
    localStorage.removeItem('discoveredElements');

    discoveredElements = new Set(BASE);
    crafted.innerHTML = '';
    selected = null;

    achievement.classList.remove('visible');
    updateUI();
}

[...discoveredElements].forEach(el => {
    if (!BASE.includes(el)) {
        crafted.appendChild(createElement(el));
    }
});

elements.forEach(el => {
    el.addEventListener('click', handleClick);
});

resetButton.addEventListener('click', resetGame);

updateUI();
</script>

</body>
</html>

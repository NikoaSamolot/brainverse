<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zgadnij liczbę</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #121212; color: #ffffff; margin:0; height:100vh; display:flex; justify-content:center; align-items:center;">

    <div style="background-color:#2c1a00; border: 3px solid #ff9900; border-radius:15px; padding:40px; width:90%; max-width:800px; text-align:center; height:90%; display:flex; flex-direction:column; justify-content:center; box-sizing:border-box;">
        <h1 style="color:#ff9900; margin-bottom:20px; font-size:3em;">Zgadnij liczbę (1-100)</h1>
        <p style="font-size:18px; color:#ffc966; margin-bottom:30px;">
            Masz 10 prób. Po każdej otrzymasz wskazówkę, czy liczba jest większa czy mniejsza.
        </p>

        <div style="margin-bottom:20px;">
            <input type="number" id="inputLiczba" placeholder="1-100"
                   style="padding:15px; border-radius:8px; border:none; width:120px; text-align:center; font-size:18px;">
            <button id="zgadnijBtn" style="padding:15px 25px; border-radius:8px; border:none; background-color:#ff9900; color:#121212; cursor:pointer; font-size:18px; margin-left:10px;">
                Zgadnij
            </button>
        </div>

        <p id="wiadomosc" style="font-weight:bold; font-size:20px; margin-bottom:20px;"></p>
        <p style="font-size:18px;">Pozostało prób: <span id="proby" style="font-weight:bold;">10</span></p>

        <div style="margin-top:auto; background-color:#1a0d00; padding:15px; border-radius:8px; border:2px solid #ff9900; font-size:18px;">
            Twój rekord (najmniej prób): <span id="rekord">0</span>
        </div>
    </div>

    <script>
        let losowa = Math.floor(Math.random() * 100) + 1;
        let proby = 10;
        let rekord = localStorage.getItem('rekordZgadnijLiczbe') || 0;
        document.getElementById('rekord').textContent = rekord;

        document.getElementById('zgadnijBtn').addEventListener('click', function() {
            let input = parseInt(document.getElementById('inputLiczba').value);
            if (isNaN(input) || input < 1 || input > 100) {
                document.getElementById('wiadomosc').textContent = "Wpisz liczbę od 1 do 100!";
                return;
            }

            proby--;
            document.getElementById('proby').textContent = proby;

            if (input === losowa) {
                document.getElementById('wiadomosc').textContent = "Brawo! Zgadłeś liczbę!";
                if ((10 - proby) < rekord || rekord == 0) {
                    rekord = 10 - proby;
                    localStorage.setItem('rekordZgadnijLiczbe', rekord);
                    document.getElementById('rekord').textContent = rekord;
                    document.getElementById('wiadomosc').textContent += " Nowy rekord!";
                }
                losowa = Math.floor(Math.random() * 100) + 1;
                proby = 10;
                document.getElementById('proby').textContent = proby;
                document.getElementById('inputLiczba').value = '';
            } else if (proby <= 0) {
                document.getElementById('wiadomosc').textContent = `Koniec prób! Liczba to ${losowa}.`;
                losowa = Math.floor(Math.random() * 100) + 1;
                proby = 10;
                document.getElementById('proby').textContent = proby;
                document.getElementById('inputLiczba').value = '';
            } else {
                document.getElementById('wiadomosc').textContent = input < losowa ? "Za mało!" : "Za dużo!";
                document.getElementById('inputLiczba').value = '';
            }
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zgadnij liczbę</title>
  <style>
    /* --- Reset & font --- */
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #283048);
      color: #eee;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    /* --- Kontener całej gry --- */
    #app {
      background: #2b2b3f;
      border-radius: 12px;
      box-shadow: 0 0 15px #00ffff88;
      width: 350px;
      max-width: 90vw;
      padding: 25px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      user-select: none;
    }

    /* --- Główna gra --- */
    #game-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      gap: 15px;
    }
    #game-screen h1 {
      margin: 0;
      color: #00ffff;
      text-align: center;
      letter-spacing: 1.2px;
    }
    #version-light {
      font-size: 0.9rem;
      color: #66ffffcc;
      font-style: italic;
      margin-bottom: 10px;
      text-align: center;
    }

    #message {
      min-height: 45px;
      font-size: 1.2rem;
      font-weight: 600;
      text-align: center;
      color: #00ffff;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { text-shadow: 0 0 10px #00ffffaa; }
      50% { text-shadow: 0 0 25px #00ffffee; }
    }

    /* --- Pole input --- */
    #input-guess {
      width: 100%;
      padding: 12px 15px;
      border-radius: 8px;
      border: none;
      font-size: 1.2rem;
      outline: none;
      color: #222;
      font-weight: 600;
    }
    /* --- Przycisk zgadnij --- */
    #btn-guess {
      background: #00ffff;
      color: #222;
      font-weight: 700;
      font-size: 1.1rem;
      border: none;
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      transition: background 0.3s;
      width: 100%;
    }
    #btn-guess:hover {
      background: #00cccc;
    }
    /* --- Reset gry --- */
    #btn-reset {
      background: #ff4d4d;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      padding: 10px 15px;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 10px;
      width: 100%;
    }
    #btn-reset:hover {
      background: #cc0000;
    }

    /* --- Informacje o trybie --- */
    #mode-info {
      font-size: 0.9rem;
      color: #888;
      text-align: center;
      margin-top: -10px;
      margin-bottom: 10px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Ekran gry -->
    <div id="game-screen">
      <h1>Zgadnij liczbę od 1 do 100</h1>
      <input type="number" id="input-guess" placeholder="Twoja liczba..." min="1" max="100" autocomplete="off" />
      <button id="btn-guess">Zgadnij!</button>
      <button id="btn-reset">Resetuj grę</button>
      <div id="message"></div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      const MIN_NUMBER = 1;
      const MAX_NUMBER = 100;

      // Elementy
      const inputGuess = document.getElementById('input-guess');
      const btnGuess = document.getElementById('btn-guess');
      const btnReset = document.getElementById('btn-reset');
      const message = document.getElementById('message');
      const modeInfo = document.getElementById('mode-info');

      let targetNumber = null;
      let attempts = 0;
      let mode = 'offline';

      function generateRandomNumber(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function startGame() {
        targetNumber = generateRandomNumber(MIN_NUMBER, MAX_NUMBER);
        attempts = 0;
        message.textContent = 'Podaj liczbę i kliknij "Zgadnij!"';
        inputGuess.value = '';
        inputGuess.disabled = false;
        btnGuess.disabled = false;
        btnReset.disabled = false;
        updateModeInfo();
        inputGuess.focus();
      }

      function updateModeInfo() {
        modeInfo.textContent = mode === 'offline' ? 'Tryb offline' : 'Tryb online (symulacja)';
      }

      function guessNumber() {
        const guessStr = inputGuess.value.trim();
        const guess = Number(guessStr);

        if (!guessStr || isNaN(guess)) {
          message.textContent = 'Wpisz poprawną liczbę!';
          return;
        }
        if (guess < MIN_NUMBER || guess > MAX_NUMBER) {
          message.textContent = `Liczba musi być od ${MIN_NUMBER} do ${MAX_NUMBER}.`;
          return;
        }
        attempts++;

        if (guess === targetNumber) {
          message.textContent = `Brawo! Trafiłeś w ${attempts} próbach.`;
          inputGuess.disabled = true;
          btnGuess.disabled = true;
        } else if (guess < targetNumber) {
          message.textContent = 'Za mało! Spróbuj wyżej.';
        } else {
          message.textContent = 'Za dużo! Spróbuj niżej.';
        }

        inputGuess.value = '';
        inputGuess.focus();
      }

      function resetGame() {
        startGame();
      }

      btnGuess.addEventListener('click', guessNumber);
      inputGuess.addEventListener('keypress', e => {
        if (e.key === 'Enter') guessNumber();
      });

      btnReset.addEventListener('click', resetGame);

      // Start gry po załadowaniu
      startGame();
    })();
  </script>
</body>
</html>

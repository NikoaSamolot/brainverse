<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zgadnij liczbę</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #121212; color: #ffffff; display:flex; justify-content:center; align-items:center; height:100vh;">

    <div style="background-color:#2c1a00; border: 2px solid #ff9900; border-radius:10px; padding:20px; width:300px; text-align:center;">
        <h2 style="color:#ff9900; margin-bottom:10px;">Zgadnij liczbę (1-100)</h2>
        <p style="font-size:12px; color:#ffc966;">Masz 10 prób. Po każdej otrzymasz wskazówkę, czy liczba jest większa czy mniejsza.</p>

        <input type="number" id="inputLiczba" placeholder="1-100" 
               style="padding:5px; border-radius:5px; border:none; width:80px; text-align:center; margin-top:10px;">
        <button id="zgadnijBtn" style="padding:5px 10px; border-radius:5px; border:none; background-color:#ff9900; color:#121212; cursor:pointer; margin-left:5px;">
            Zgadnij
        </button>

        <p id="wiadomosc" style="font-weight:bold; font-size:14px; margin-top:10px;"></p>
        <p>Pozostało prób: <span id="proby">10</span></p>

        <div style="margin-top:10px; background-color:#1a0d00; padding:5px; border-radius:5px; border:1px solid #ff9900; font-size:12px;">
            Twój rekord (najmniej prób): <span id="rekord">0</span>
        </div>
    </div>

    <script>
        let losowa = Math.floor(Math.random() * 100) + 1;
        let proby = 10;
        let rekord = localStorage.getItem('rekordZgadnijLiczbe') || 0;
        document.getElementById('rekord').textContent = rekord;

        document.getElementById('zgadnijBtn').addEventListener('click', function() {
            let input = parseInt(document.getElementById('inputLiczba').value);
            if (isNaN(input) || input < 1 || input > 100) {
                document.getElementById('wiadomosc').textContent = "Wpisz liczbę od 1 do 100!";
                return;
            }

            proby--;
            document.getElementById('proby').textContent = proby;

            if (input === losowa) {
                document.getElementById('wiadomosc').textContent = "Brawo! Zgadłeś liczbę!";
                if ((10 - proby) < rekord || rekord == 0) {
                    rekord = 10 - proby;
                    localStorage.setItem('rekordZgadnijLiczbe', rekord);
                    document.getElementById('rekord').textContent = rekord;
                    document.getElementById('wiadomosc').textContent += " Nowy rekord!";
                }
                losowa = Math.floor(Math.random() * 100) + 1;
                proby = 10;
                document.getElementById('proby').textContent = proby;
                document.getElementById('inputLiczba').value = '';
            } else if (proby <= 0) {
                document.getElementById('wiadomosc').textContent = `Koniec prób! Liczba to ${losowa}.`;
                losowa = Math.floor(Math.random() * 100) + 1;
                proby = 10;
                document.getElementById('proby').textContent = proby;
                document.getElementById('inputLiczba').value = '';
            } else {
                document.getElementById('wiadomosc').textContent = input < losowa ? "Za mało!" : "Za dużo!";
                document.getElementById('inputLiczba').value = '';
            }
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineVerse</title>
<link rel="icon" type="image/png" href="cineverse-logo.png">
<style>
body { margin:0; font-family: 'Segoe UI', sans-serif; background:#0c0c0c; color:#eee; }
header { background:#111; padding:25px; font-size:2.2em; text-align:center; letter-spacing:1px; border-bottom:2px solid #222;}
.login-page, .catalog { display:none; }
.login-page { display:flex; height:calc(100vh - 80px); justify-content:center; align-items:center; flex-direction:column; }
input { padding:12px 15px; margin:10px 0; width:280px; border-radius:6px; border:none; background:#222; color:#fff; font-size:1em; }
button { padding:10px 24px; border:none; border-radius:6px; cursor:pointer; background:#1e90ff; color:#fff; font-size:1em; transition:0.25s;}
button:hover { background:#1c7ed6; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:22px; margin-bottom:30px; }
.card { cursor:pointer; transition: transform 0.25s ease, box-shadow 0.25s ease; }
.card:hover { transform:scale(1.07); box-shadow:0px 8px 22px rgba(0,0,0,0.8); }
.card img { width:100%; border-radius:8px; }
.card-title { text-align:center; font-weight:bold; margin-top:6px; }
.card-type { text-align:center; font-size:0.85em; color:#aaa; }
.readfirst { background:#222; padding:18px; border-radius:8px; margin-bottom:30px; font-size:0.92em; line-height:1.45em; color:#ccc; }
.modal-bg { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; padding:20px; z-index:1000;}
.modal { background:#111; max-width:720px; width:100%; border-radius:10px; overflow:hidden; }
.modal-header { padding:15px 20px; font-size:1.5em; font-weight:bold; border-bottom:2px solid #222; }
.modal-content { padding:15px 20px; max-height:70vh; overflow-y:auto; }
.modal-image { width:auto; height:200px; display:block; margin:0 auto 15px auto; border-radius:6px; }
.modal-text { font-size:0.95em; margin-bottom:14px; color:#ddd; line-height:1.4em; }
.modal-buttons { text-align:right; }
.modal-btn { padding:10px 18px; margin-left:8px; background:#1e90ff; border:none; color:#fff; border-radius:6px; cursor:pointer; font-size:0.96em; }
.modal-btn:hover { background:#1c7ed6; }
.logout-btn { background:#ff4d4d; }
.logout-btn:hover { background:#e03e3e; }
h2 { margin-top:30px; color:#1e90ff; }
.account-display { position:absolute; top:25px; right:25px; display:flex; align-items:center; gap:10px; color:#fff; font-weight:bold; }
</style>
</head>
<body>

<header>CineVerse</header>

<!-- LOGOWANIE -->
<div class="login-page" id="loginPage">
  <h2>CineVerse - Logowanie</h2>
  <input type="text" id="username" placeholder="Login">
  <input type="password" id="password" placeholder="Hasło">
  <button onclick="checkLogin()">Zaloguj</button>
</div>

<!-- KATALOG -->
<div class="catalog" id="catalogPage">
  <div class="account-display">
    <span id="currentUser"></span>
    <button class="logout-btn" onclick="logout()">Wyloguj</button>
  </div>
  <div class="readfirst">
    Ta sekcja jest przeznaczona do użytku prywatnego. Filmy nie należą do mnie i nie posiadam praw autorskich. Oglądanie możliwe tylko dla wybranych osób. Oglądasz na własną odpowiedzialność.
  </div>

  <!-- DLA DZIECI -->
  <h2>Dla dzieci</h2>
  <div class="grid" id="kidsGrid"></div>

  <!-- SERIALE -->
  <h2>Seriale</h2>
  <div class="grid" id="seriesGrid"></div>

  <!-- HORROR -->
  <h2>Horror</h2>
  <div class="grid" id="horrorGrid"></div>

  <!-- KOMEDIA -->
  <h2>Komedia</h2>
  <div class="grid" id="KomediaGrid"></div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-header" id="modalTitle"></div>
    <div class="modal-content">
      <img class="modal-image" id="modalImage" src="">
      <div class="modal-text" id="modalDesc"></div>
      <div class="modal-buttons">
        <button class="modal-btn" onclick="closeModal()">Zamknij</button>
        <button class="modal-btn" id="watchBtn" onclick="watchNow()">Oglądaj</button>
      </div>
    </div>
  </div>
</div>

<script>
// --- FILMY Z KATEGORIAMI ---
const films = [
  { title:"Auta", img:"auta.jpg", desc:"Samochód wyścigowy Zygzak McQueen to prawdziwy wybraniec losu, żyje na najwyższych obrotach i jest zwycięzcą sezonu. Teraz jednak, zamiast na kolejny wyścig, trafia przypadkowo do małego, zapomnianego miasteczka, leżącego nieopodal słynnej amerykańskiej trasy numer 66. Poznaje niezwykłych mieszkańców osady, Sally, Złomka, Wójta Hudsona i innych, dzięki którym przekonuje się, że wygrane wyścigi, trofea i sława nie są w życiu najważniejsze.", link:"https://drive.google.com/file/d/1XoXuFcKv6Oqu1yR0BHN-LnKJYGY7SIYG/view?usp=drive_link", category:"kids" },
  { title:"Auta 2", img:"auta2.jpg", desc:"Druga część wielkiego hitu z 2006 roku. Samochód wyścigowy Zygzak McQueen po raz kolejny weźmie udział w wielkim wyścigu. Tym razem wyścig będzie obejmował trasę w Japonii, Austrii, Włoszech, Francji oraz Wielkiej Brytanii, jednak Zygzak wraz z swoim wiernym towarzyszem Złomkiem zostanie wplątany w między narodową intrygę szpiegowską.", link:"https://drive.google.com/file/d/1Y6dxgPELfA4QmrLxJxwQZzvaZ1UKdedQ/view?usp=sharing", category:"kids" }, 
  { title:"Auta 3", img:"auta3.jpg", desc:"Legenda sportu motorowego, Zygzak McQueen, zostaje zepchnięty na boczny tor przez ultraszybkie auta nowej generacji. Wrócić do gry pomoże mu młoda, pełna zapału mechaniczka, Cruz Ramirez, która obmyśla autorski plan zwycięstwa. I choć na swojej drodze Zygzak napotka kilka niespodziewanych zakrętów, udowodni, że zdobywca Złotego Tłoka nie poddaje się tak łatwo!", link:"https://drive.google.com/file/d/10U6mLEIMPljY5SzeOUv_pqvULLhfmdvS/view?usp=sharing", category:"kids"},
  { title:"The Bad Guys", img:"badguys.jpg", desc:"Panowie Wilk, Wąż, Pirania, Rekin oraz Tarantula postanawiają zakończyć swoją kryminalną aktywność i przewartościować swoje życie.", link:"https://drive.google.com/file/d/1HrBSfA4HpY0A8tMumslBt9vXEWymU_iz/view?usp=sharing", category:"kids" },
  { title:"The Truman Show", img:"truman.jpg", desc:"Truman Burbank (Jim Carrey) mieszka w uroczym nadmorskim miasteczku i wiedzie przeciętne, raczej szczęśliwe życie u boku kochającej żony. To, co dla wielu byłoby nieziszczalnym marzeniem, Truman otrzymał bez specjalnego wysiłku. Właśnie - otrzymał, a nie zdobył, bowiem Truman jest gwiazdą telewizyjnego serialu emitowanego przez 24 godziny na dobę. O każdym jego kroku decyduje wszechwładny reżyser Christof (Ed Harris), od niego zależy nie tylko to, kogo Truman spotka na swej drodze, ale i to, czy danego dnia będzie świecić słońce. Ale nawet on nie przewidział, że wykreowany przez niego bohater zacznie domyślać się istnienia innego świata - spoza telewizyjnego studia.", link:"https://drive.google.com/file/d/1NoGXnpKVoFIUX_Q0yLhNVtkql6s_jdFo/view?usp=sharing", category:"Komedia" },
  { title:"Pięć koszmarnych nocy", img:"fnaf.jpg", desc:"Mike Schmidt (Josh Hutcherson) traci pracę. Desperacko poszukuje zajęcia, aby zachować prawo do opieki nad swoją dziesięcioletnią siostrą Abby (Piper Rubio). Przyjmuje posadę nocnego stróża w opuszczonej restauracji Freddy Fazbear’s Pizzeria, która została zamknięta po serii niewyjaśnionych zaginięć dzieci w latach 80. Już na swojej pierwszej zmianie mężczyzna odkrywa, że nie wszystko jest takie, jakim się wydaje, a mechaniczne kukiełki (animatroniki), będące główną atrakcją tego miejsca, ożywają pod osłoną mroku i stanowią śmiertelne niebezpieczeństwo. Razem z Abby i lokalną policjantką, Vanessą (Elizabeth Lail) stają oko w oko z siłami nadprzyrodzonymi. Czy Mike'owi uda się przetrwać pięć koszmarnych nocy?", link:"https://drive.google.com/file/d/1ymnQ471hABxRioCmSgj1NjewqA_1EGQS/view?usp=sharing", category:"horror" },
  { title:"M3gan", img:"m3gan.jpg", desc:"Gemma jest znakomitą programistką w firmie produkującej zabawki. Jej nowym zadaniem jest opracowanie lalki z wykorzystaniem sztucznej inteligencji. I tak właśnie powstanie lalka-M3GAN. Realistyczna zabawka zostanie zaprogramowaną jako najwspanialsza towarzyszka dziecka i największy sojusznik rodzica.Gemma niespodziewanie musi zaopiekować się swoją osieroconą siostrzenicą. Postanawia skorzystać z pomocy prototypu M3GAN. Decyzja ta przyniesie niewyobrażalne konsekwencje.", link:"https://drive.google.com/file/d/1OEIdkul4J05n1l7hVArzY2cJKGBr66xK/view?usp=sharing", category:"horror" },
  { title:"Dostępne wkrótce", img:"soon.jpg", desc:"OPIS", link:"LINK_DO_DRIVE", category:"series" },
  { title:"Nietykalni", img:"nietykalni.jpg", desc:"Ta historia zdarzyła się naprawdę. Sparaliżowany na skutek wypadku milioner zatrudnia do pomocy i opieki młodego chłopaka z przedmieścia, który właśnie wyszedł z więzienia. Zderzenie dwóch skrajnie różnych światów daje początek szeregowi niewiarygodnych przygód i przyjaźni, która czyni ich... nietykalnymi.", link:"https://drive.google.com/file/d/1LIw1OsqvW63uca4sI-xxJzw7JL_T5kZK/view?usp=drivesdk", category:"Komedia" },
  { title:"Opowieści z Narnii: Lew, czarownica i stara szafa", img:"narnia.jpg", desc:"Film powstał na podstawie popularnej serii książek dla dzieci autorstwa C.S.Lewisa, mówiących o walce dobra ze złem. Podczas wakacji rodzeństwo - Łucja, Zuzanna, Edmund i Piotr (Lucy, Susan, Edmund, Peter) Pevensie odkrywają magiczną krainę Narnię, do której dostać się można przez drzwi zaczarowanej szafy. W Narnii, pod wpływem uroku rzuconego przez Białą Czarownicę, od 100 lat panuje nieustanna zima. Wszyscy Narnijczycy czekają na powrót lwa Aslana, który jako jedyny pokonać może siły zła. Pomoże mu w tym rodzeństwo Pevensie.", link:"https://drive.google.com/file/d/1MqJka3zR0zZseDLw6sbhTDuEhvBZk3-R/view?usp=sharing", category:"kids" },
  { title:"Minecraft Film", img:"minecraft.jpg", desc:"Witamy w świecie Minecrafta, gdzie kreatywność nie tylko pomaga tworzyć, lecz jest niezbędna do przetrwania! Czworo nieudaczników - Garrett Śmieciarz Garrison (Jason Momoa), Henry (Sebastian Hansen), Natalie (Emma Myers) i Dawn (Danielle Brooks) - zmaga się z codziennymi problemami, kiedy nagle tajemniczy portal wciąga ich do Nadziemia - dziwacznej krainy pełnej sześcianów, w której najważniejsza jest wyobraźnia. Aby wrócić do domu, będą musieli zapanować nad tym światem i ochronić go przed złymi stworzeniami, takimi jak pigliny i zombie. W tym celu wyruszają na magiczną wyprawę z nieoczekiwanym towarzyszem - doświadczonym graczem Stevem (Jack Black). Ta przygoda zmusi całą piątkę do wykazania się odwagą i odkrycia w sobie cech, dzięki którym każde z nich jest na swój sposób kreatywne. Są to te same cechy, które pomagają żyć w prawdziwym świecie.", link:"https://drive.google.com/file/d/1kOBre0DyYqDO08qd9zKRfODY6OrJJJcO/view?usp=sharing", category:"Komedia" }
];

// --- STATYCZNE KONTA ---
const accounts = [
  { username: "nikodem", password: "haslo123" },
  { username: "konto1", password: "haslo1" },
  { username: "olaf", password: "olaf123"}
];

// --- LOGOWANIE ---
function checkLogin() {
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;
  const found = accounts.find(acc => acc.username === u && acc.password === p);
  if(found){
    localStorage.setItem('brainverseLogged', 'true');
    localStorage.setItem('currentUser', found.username);
    showCatalog();
  } else {
    alert("Nieprawidłowy login lub hasło");
  }
}

function checkLocalStorage() {
  if(localStorage.getItem('brainverseLogged') === 'true') showCatalog();
  else document.getElementById('loginPage').style.display='flex';
}

function logout() {
  localStorage.removeItem('brainverseLogged');
  localStorage.removeItem('currentUser');
  document.getElementById('catalogPage').style.display='none';
  document.getElementById('loginPage').style.display='flex';
}

// --- POKAZYWANIE KATALOGU I AKTUALNEGO UŻYTKOWNIKA ---
function showCatalog() {
  document.getElementById('loginPage').style.display='none';
  document.getElementById('catalogPage').style.display='block';
  document.getElementById('currentUser').textContent = "Zalogowany: " + (localStorage.getItem('currentUser') || '');
  renderFilms();
}

// --- RENDEROWANIE FILMÓW ---
function renderFilms() {
  const kidsGrid = document.getElementById('kidsGrid');
  const seriesGrid = document.getElementById('seriesGrid');
  const horrorGrid = document.getElementById('horrorGrid');
  const KomediaGrid = document.getElementById('KomediaGrid');
  kidsGrid.innerHTML = seriesGrid.innerHTML = horrorGrid.innerHTML = KomediaGrid.innerHTML = '';
  
  films.forEach((f,i)=>{
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = ()=>showModal(i);
    card.innerHTML = `<img src="${f.img}" alt="${f.title}"><div class="card-title">${f.title}</div>` + (f.category==='series'?'<div class="card-type">(serial)</div>':'');
    
    if(f.category==='kids') kidsGrid.appendChild(card);
    else if(f.category==='series') seriesGrid.appendChild(card);
    else if(f.category==='horror') horrorGrid.appendChild(card);
    else KomediaGrid.appendChild(card);
  });
}

// --- MODAL ---
function showModal(i) {
  const m = films[i];
  document.getElementById('modalTitle').textContent = m.title;
  document.getElementById('modalDesc').textContent = m.desc;
  document.getElementById('modalImage').src = m.img;
  document.getElementById('watchBtn').setAttribute("data-link", m.link);
  document.getElementById('modalBg').style.display="flex";
}
function closeModal() { document.getElementById('modalBg').style.display="none"; }
function watchNow() { window.open(document.getElementById('watchBtn').getAttribute("data-link"), "_blank"); }

// --- URUCHOMIENIE ---
checkLocalStorage();
</script>

</body>
</html>

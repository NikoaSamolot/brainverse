<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>MatGuess</title>
</head>
<body style="background-color: orange; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #fff;">

<h1>Matematyczna Gra Losowa</h1>
<p>Kliknij START, aby rozpocząć. Rozwiązuj zadania, aż się pomylisz!</p>

<button id="startBtn" style="padding: 10px 20px; font-size: 18px; cursor: pointer;">START</button>

<div id="gameArea" style="margin-top: 30px; display: none; flex-direction: column; align-items: center;">
  <p id="question" style="font-size: 24px; margin-bottom: 15px;"></p>
  <input type="number" id="answerInput" style="font-size: 20px; padding: 5px;" />
  <button id="submitBtn" style="padding: 8px 15px; font-size: 18px; margin-top: 10px; cursor: pointer;">Sprawdź</button>
</div>

<p id="scoreDisplay" style="margin-top: 40px; font-size: 20px;">Twój rekord: 0</p>

<script>
let currentScore = 0;
let record = localStorage.getItem('mathGameRecord') ? parseInt(localStorage.getItem('mathGameRecord')) : 0;
document.getElementById('scoreDisplay').innerText = 'Twój rekord: ' + record;

const startBtn = document.getElementById('startBtn');
const gameArea = document.getElementById('gameArea');
const questionEl = document.getElementById('question');
const answerInput = document.getElementById('answerInput');
const submitBtn = document.getElementById('submitBtn');

let currentAnswer = 0;

function generateQuestion() {
    const types = ['add', 'sub', 'mul', 'div', 'sqrt', 'cbrt'];
    const type = types[Math.floor(Math.random() * types.length)];
    let a, b;
    switch(type) {
        case 'add':
            a = Math.floor(Math.random() * 100);
            b = Math.floor(Math.random() * 100);
            currentAnswer = a + b;
            questionEl.innerText = `${a} + ${b} = ?`;
            break;
        case 'sub':
            a = Math.floor(Math.random() * 100);
            b = Math.floor(Math.random() * 100);
            currentAnswer = a - b;
            questionEl.innerText = `${a} - ${b} = ?`;
            break;
        case 'mul':
            a = Math.floor(Math.random() * 20);
            b = Math.floor(Math.random() * 20);
            currentAnswer = a * b;
            questionEl.innerText = `${a} × ${b} = ?`;
            break;
        case 'div':
            b = Math.floor(Math.random() * 19) + 1; // unikamy dzielenia przez 0
            currentAnswer = Math.floor(Math.random() * 20) * b;
            a = currentAnswer;
            questionEl.innerText = `${a} ÷ ${b} = ?`;
            break;
        case 'sqrt':
            a = Math.floor(Math.random() * 10) + 1;
            currentAnswer = a * a;
            questionEl.innerText = `√${currentAnswer} = ?`;
            currentAnswer = a;
            break;
        case 'cbrt':
            a = Math.floor(Math.random() * 5) + 1;
            currentAnswer = a * a * a;
            questionEl.innerText = `∛${currentAnswer} = ?`;
            currentAnswer = a;
            break;
    }
    answerInput.value = '';
    answerInput.focus();
}

startBtn.addEventListener('click', () => {
    currentScore = 0;
    startBtn.style.display = 'none';
    gameArea.style.display = 'flex';
    generateQuestion();
});

submitBtn.addEventListener('click', () => {
    const userAnswer = parseFloat(answerInput.value);
    if (userAnswer === currentAnswer) {
        currentScore++;
        generateQuestion();
    } else {
        alert('Źle! Gra zakończona.');
        if (currentScore > record) {
            record = currentScore;
            localStorage.setItem('mathGameRecord', record);
        }
        document.getElementById('scoreDisplay').innerText = 'Twój rekord: ' + record;
        startBtn.style.display = 'inline-block';
        gameArea.style.display = 'none';
    }
});

answerInput.addEventListener('keyup', (e) => {
    if(e.key === 'Enter') submitBtn.click();
});
</script>

</body>
</html>

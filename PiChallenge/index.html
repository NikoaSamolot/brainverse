<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Pi Challenge 1000</title>
<style>
body{font-family:Arial;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:white;text-align:center;margin:0;padding:0;}
h1{margin-top:30px;font-size:40px;}
.game{margin:auto;margin-top:40px;background:rgba(0,0,0,0.5);padding:30px;border-radius:15px;width:500px;box-shadow:0 0 30px cyan;overflow-wrap:break-word;}
.pi{font-size:22px;margin:20px;max-height:300px;overflow-y:auto;}
input{font-size:22px;width:60px;text-align:center;padding:8px;border-radius:8px;border:none;}
button{padding:10px 18px;font-size:16px;margin:10px;border:none;border-radius:10px;background:cyan;cursor:pointer;}
button:hover{background:#00aaff;}
.stats{margin-top:15px;font-size:18px;}
.achievements{margin-top:20px;text-align:left;}
.achievement{background:rgba(255,255,255,0.1);padding:8px;border-radius:8px;margin:6px 0;}
.unlocked{background:rgba(0,255,150,0.3);}
.popup{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:black;padding:15px 30px;border-radius:10px;box-shadow:0 0 20px gold;font-size:18px;display:none;}
</style>
</head>
<body>

<h1>π Memory Challenge 1000</h1>
<div class="game">
  <div class="pi" id="piDisplay">3.</div>
  <input id="digit" maxlength="1">
  <br>
  <button onclick="submitDigit()">Sprawdź</button>
  <button onclick="resetGame()">Nowa gra</button>

  <div class="stats">
    Rekord: <span id="record">0</span> cyfr<br>
    Obecny wynik: <span id="score">0</span>
  </div>

  <div class="achievements">
    <h3>Osiągnięcia</h3>
    <div id="a3" class="achievement">🥉 Początkujący matematyk — 3 cyfry</div>
    <div id="a10" class="achievement">🥈 Znawca π — 10 cyfr</div>
    <div id="a20" class="achievement">🥇 Mistrz π — 20 cyfr</div>
    <div id="a50" class="achievement">🧠 Geniusz π — 50 cyfr</div>
    <div id="a100" class="achievement">🚀 Legenda π — 100 cyfr</div>
    <div id="a500" class="achievement">🌟 Mega π — 500 cyfr</div>
    <div id="a1000" class="achievement">🔥 Ultra π — 1000 cyfr</div>
  </div>

  <br>
  <button onclick="resetData()">Reset wszystkich danych</button>
</div>

<div id="popup" class="popup"></div>

let index = 0;
let score = 0;

let record = localStorage.getItem("pi_record") || 0;
document.getElementById("record").innerText = record;

let achievements = JSON.parse(localStorage.getItem("pi_achievements") || "[]");

function updateAchievements(){
  const list = [3,10,20,50,100,500,1000];
  list.forEach(a=>{
    if(score>=a && !achievements.includes(a)){
      achievements.push(a);
      showPopup("Osiągnięcie odblokowane: "+a+" cyfr!");
    }
  });
  localStorage.setItem("pi_achievements", JSON.stringify(achievements));
  list.forEach(a=>{
    if(achievements.includes(a))
      document.getElementById("a"+a).classList.add("unlocked");
  });
}

updateAchievements();

function submitDigit(){
  let input = document.getElementById("digit").value;
  document.getElementById("digit").value="";
  if(input==pi[index]){
    index++;
    score++;
    document.getElementById("score").innerText = score;
    document.getElementById("piDisplay").innerText = "3."+pi.substring(0,index);
    updateAchievements();
  } else {
    alert("Game Over! Wynik: "+score);
    if(score>record){
      record = score;
      localStorage.setItem("pi_record", record);
      document.getElementById("record").innerText = record;
    }
    resetGame();
  }
}

function resetGame(){
  index=0; score=0;
  document.getElementById("score").innerText=0;
  document.getElementById("piDisplay").innerText="3.";
}

function resetData(){
  localStorage.clear();
  location.reload();
}

function showPopup(text){
  let p=document.getElementById("popup");
  p.innerText=text;
  p.style.display="block";
  setTimeout(()=>{p.style.display="none";},2000);
}

document.getElementById("digit").addEventListener("keypress",function(e){
  if(e.key==="Enter") submitDigit();
});
</script>

    </html>

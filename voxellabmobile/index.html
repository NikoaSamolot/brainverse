<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voxel Lab</title>

<link rel="icon" type="image/png" href="vlp.png">

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:sans-serif;
    background:#000;
}

/* ===== UI ===== */

#title{
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:20px;
    font-weight:bold;
    background:rgba(0,0,0,0.5);
    padding:6px 14px;
    border-radius:6px;
    z-index:10;
}

#hud{
    display:none; /* USUNIĘTE INFO O BUILD/REMOVE */
}

#panel{
    position:absolute;
    top:10px;
    right:10px;
    display:flex;
    flex-direction:column;
    gap:6px;
    z-index:10;
}

.btn{
    padding:8px 10px;
    background:#222;
    color:white;
    border:1px solid #555;
    cursor:pointer;
    border-radius:6px;
    font-size:12px;
}

.btn:hover{ background:#333; }

#crosshair{
    position:absolute;
    top:50%;
    left:50%;
    width:8px;
    height:8px;
    margin:-4px;
    border:1px solid white;
}

#hotbar{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:6px;
}

.slot{
    width:45px;
    height:45px;
    border:2px solid #555;
    background:#222;
}

.slot.active{
    border:2px solid yellow;
}

/* ===== MOBILE CONTROLS ===== */

#mobileLeft{
    position:absolute;
    left:15px;
    bottom:80px;
    display:grid;
    grid-template-columns:40px 40px 40px;
    grid-template-rows:40px 40px 40px;
    gap:5px;
    z-index:20;
}

#mobileRight{
    position:absolute;
    right:20px;
    bottom:100px;
    z-index:20;
}

.mbtn{
    width:40px;
    height:40px;
    background:rgba(0,0,0,0.5);
    border:1px solid #666;
    color:white;
    font-size:16px;
    border-radius:6px;
}

/* układ strzałek */
#up{ grid-column:2; grid-row:1; }
#left{ grid-column:1; grid-row:2; }
#down{ grid-column:2; grid-row:3; }
#right{ grid-column:3; grid-row:2; }

canvas{display:block;}
</style>
</head>

<body>

<div id="title">Voxel Lab</div>

<div id="panel">
    <button class="btn" onclick="saveWorld()">Save</button>
    <button class="btn" onclick="loadWorld()">Load</button>
    <button class="btn" onclick="exportWorld()">Export</button>
    <input type="file" id="fileInput" style="display:none" onchange="importWorld(event)">
    <button class="btn" onclick="fileInput.click()">Import</button>
</div>

<div id="crosshair"></div>
<div id="hotbar"></div>

<!-- MOBILE CONTROLS -->
<div id="mobileLeft">
    <button class="mbtn" id="up">▲</button>
    <button class="mbtn" id="left">◀</button>
    <button class="mbtn" id="down">▼</button>
    <button class="mbtn" id="right">▶</button>
</div>

<div id="mobileRight">
    <button class="mbtn" id="jump">⤒</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

<script>

let scene,camera,renderer,controls;
let velocity=new THREE.Vector3();
let blocks={};
let keys={};

const spawn=new THREE.Vector3(8,3,8);
const SPEED=0.12;
const GRAVITY=0.015;
const JUMP=0.22;

let selected=0;

/* ===== MOBILE INPUT ===== */

function bindHold(id, key){
    const el=document.getElementById(id);

    el.addEventListener("touchstart",e=>{
        e.preventDefault();
        keys[key]=true;
    });

    el.addEventListener("touchend",e=>{
        e.preventDefault();
        keys[key]=false;
    });

    el.addEventListener("mousedown",()=>{
        keys[key]=true;
    });

    el.addEventListener("mouseup",()=>{
        keys[key]=false;
    });
}

bindHold("up","KeyW");
bindHold("down","KeyS");
bindHold("left","KeyA");
bindHold("right","KeyD");

document.getElementById("jump").addEventListener("touchstart",jump);
document.getElementById("jump").addEventListener("mousedown",jump);

function jump(){
    if(isGrounded()) velocity.y=JUMP;
}

/* ===== TEXTURES ===== */

function makeTexture(drawFn){
    const size=32;
    const canvas=document.createElement("canvas");
    canvas.width=size;
    canvas.height=size;
    const ctx=canvas.getContext("2d");
    drawFn(ctx,size);

    const tex=new THREE.CanvasTexture(canvas);
    tex.magFilter=THREE.NearestFilter;
    tex.minFilter=THREE.NearestFilter;
    return tex;
}

/* ===== BLOCK TEXTURES ===== */

const grassTopTex=makeTexture((ctx,s)=>{
    ctx.fillStyle="#3cb371";
    ctx.fillRect(0,0,s,s);
});

const dirtTex=makeTexture((ctx,s)=>{
    ctx.fillStyle="#7a4e2d";
    ctx.fillRect(0,0,s,s);
});

const stoneTex=makeTexture((ctx,s)=>{
    ctx.fillStyle="#7d7d7d";
    ctx.fillRect(0,0,s,s);
});

const sandTex=makeTexture((ctx,s)=>{
    ctx.fillStyle="#e6d3a3";
    ctx.fillRect(0,0,s,s);
});

const woodTex=makeTexture((ctx,s)=>{
    ctx.fillStyle="#6b4f2a";
    ctx.fillRect(0,0,s,s);
});

/* ===== MATERIALS ===== */

const materials=[
    new THREE.MeshBasicMaterial({map:grassTopTex}),
    new THREE.MeshBasicMaterial({map:dirtTex}),
    new THREE.MeshBasicMaterial({map:stoneTex}),
    new THREE.MeshBasicMaterial({map:sandTex}),
    new THREE.MeshBasicMaterial({map:woodTex}),
];

/* ===== INIT ===== */

init();
animate();
createHotbar();

function init(){

    scene=new THREE.Scene();
    scene.background=new THREE.Color(0x87ceeb);

    camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,800);

    renderer=new THREE.WebGLRenderer({antialias:false});
    renderer.setSize(innerWidth,innerHeight);
    document.body.appendChild(renderer.domElement);

    controls=new THREE.PointerLockControls(camera,document.body);
    scene.add(controls.getObject());

    document.body.addEventListener("click",()=>controls.lock());

    for(let x=0;x<16;x++){
        for(let z=0;z<16;z++){
            addBlock(x,0,z,1);
            addBlock(x,1,z,0);
        }
    }

    controls.getObject().position.copy(spawn);

    document.addEventListener("keydown",e=>{
        keys[e.code]=true;

        if(e.code==="Digit1") setSelected(0);
        if(e.code==="Digit2") setSelected(1);
        if(e.code==="Digit3") setSelected(2);
        if(e.code==="Digit4") setSelected(3);
        if(e.code==="Digit5") setSelected(4);

        if(e.code==="Space" && isGrounded()) velocity.y=JUMP;
    });

    document.addEventListener("keyup",e=>keys[e.code]=false);
}

/* ===== BLOCKS ===== */

function addBlock(x,y,z,type){
    const k=`${x},${y},${z}`;
    if(blocks[k]) return;

    const mesh=new THREE.Mesh(
        new THREE.BoxGeometry(1,1,1),
        materials[type]
    );

    mesh.position.set(x,y,z);
    mesh.userData.type=type;

    scene.add(mesh);
    blocks[k]=mesh;
}

/* ===== COLLISION ===== */

function collides(pos){
    for(const k in blocks){
        const b=blocks[k];

        if(
            Math.abs(b.position.x-pos.x)<0.6 &&
            Math.abs(b.position.y-pos.y)<1.5 &&
            Math.abs(b.position.z-pos.z)<0.6
        ) return true;
    }
    return false;
}

function isGrounded(){
    const p=controls.getObject().position.clone();
    p.y-=0.1;
    return collides(p);
}

/* ===== HOTBAR ===== */

function createHotbar(){
    const bar=document.getElementById("hotbar");
    for(let i=0;i<5;i++){
        const slot=document.createElement("div");
        slot.className="slot";
        bar.appendChild(slot);
    }
    updateHotbar();
}

function setSelected(i){
    selected=i;
    updateHotbar();
}

function updateHotbar(){
    const colors=["#3cb371","#7a4e2d","#808080","#d2b48c","#6b4f2a"];
    document.querySelectorAll(".slot").forEach((s,i)=>{
        s.style.background=colors[i];
        s.classList.toggle("active",i===selected);
    });
}

/* ===== LOOP ===== */

function animate(){
    requestAnimationFrame(animate);

    const obj=controls.getObject();
    const prev=obj.position.clone();

    if(controls.isLocked){
        if(keys["KeyW"]) controls.moveForward(SPEED);
        if(keys["KeyS"]) controls.moveForward(-SPEED);
        if(keys["KeyA"]) controls.moveRight(-SPEED);
        if(keys["KeyD"]) controls.moveRight(SPEED);
    }

    if(collides(obj.position)){
        obj.position.x=prev.x;
        obj.position.z=prev.z;
    }

    velocity.y-=GRAVITY;
    obj.position.y+=velocity.y;

    if(collides(obj.position)){
        obj.position.y=prev.y;
        velocity.y=0;
    }

    renderer.render(scene,camera);
}

</script>

</body>
</html>

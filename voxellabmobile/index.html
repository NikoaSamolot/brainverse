<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voxel Lab - Mobile</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:sans-serif;
    background:#000;
    touch-action:none;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-size:12px;
    background:rgba(0,0,0,0.5);
    padding:6px;
    border-radius:6px;
    z-index:10;
}

#panel{
    position:absolute;
    top:10px;
    right:10px;
    z-index:20;
}

.btn{
    padding:8px 10px;
    background:#222;
    color:white;
    border:1px solid #555;
    border-radius:6px;
    font-size:12px;
}

/* joystick */
#joystickBase{
    position:absolute;
    bottom:60px;
    left:60px;
    width:120px;
    height:120px;
    border-radius:50%;
    background:rgba(255,255,255,0.1);
    z-index:20;
}

#joystickStick{
    position:absolute;
    width:50px;
    height:50px;
    border-radius:50%;
    background:rgba(255,255,255,0.4);
    left:35px;
    top:35px;
}

/* jump */
#jumpBtn{
    position:absolute;
    bottom:80px;
    right:60px;
    width:90px;
    height:90px;
    border-radius:50%;
    background:rgba(255,255,255,0.2);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:14px;
    z-index:20;
}

canvas{display:block;}
</style>
</head>

<body>

<div id="ui">Joystick | Look drag | Jump | Import JSON</div>

<div id="panel">
    <button class="btn" onclick="fileInput.click()">IMPORT</button>
    <input type="file" id="fileInput" accept=".json" style="display:none">
</div>

<div id="joystickBase"><div id="joystickStick"></div></div>
<div id="jumpBtn">JUMP</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

<script>

let scene, camera, renderer;
let velocity = new THREE.Vector3();
let keys = {};

const SPEED = 0.12;
const GRAVITY = 0.015;
const JUMP = 0.22;

const spawn = new THREE.Vector3(8,3,8);

let yaw = 0;
let pitch = 0;

let blocks = {};

/* ================= TEXTURES ================= */

function makeTexture(drawFn){
    const size = 32;
    const c = document.createElement("canvas");
    c.width = c.height = size;
    const ctx = c.getContext("2d");
    drawFn(ctx,size);

    const tex = new THREE.CanvasTexture(c);
    tex.magFilter = THREE.NearestFilter;
    tex.minFilter = THREE.NearestFilter;
    return tex;
}

function createTextTexture(text){
    const c = document.createElement("canvas");
    c.width = c.height = 256;
    const ctx = c.getContext("2d");

    ctx.fillStyle="#000";
    ctx.fillRect(0,0,256,256);

    ctx.fillStyle="#fff";
    ctx.font="24px sans-serif";
    ctx.textAlign="center";
    ctx.textBaseline="middle";

    if(text.length>60) text=text.slice(0,60);
    ctx.fillText(text,128,128);

    return new THREE.CanvasTexture(c);
}

/* ORIGINAL TEXTURES */
const grassTop = makeTexture((c,s)=>{
    c.fillStyle="#3cb371"; c.fillRect(0,0,s,s);
});

const grassSide = makeTexture((c,s)=>{
    c.fillStyle="#7a4e2d"; c.fillRect(0,0,s,s);
    c.fillStyle="#3cb371"; c.fillRect(0,0,s,s/3);
});

const dirt = makeTexture((c,s)=>{
    c.fillStyle="#7a4e2d"; c.fillRect(0,0,s,s);
});

const stone = makeTexture((c,s)=>{
    c.fillStyle="#7d7d7d"; c.fillRect(0,0,s,s);
});

const sand = makeTexture((c,s)=>{
    c.fillStyle="#e6d3a3"; c.fillRect(0,0,s,s);
});

const wood = makeTexture((c,s)=>{
    c.fillStyle="#6b4f2a"; c.fillRect(0,0,s,s);
});

/* MATERIALS */
const materials = [
    [
        new THREE.MeshBasicMaterial({map:grassSide}),
        new THREE.MeshBasicMaterial({map:grassSide}),
        new THREE.MeshBasicMaterial({map:grassTop}),
        new THREE.MeshBasicMaterial({map:dirt}),
        new THREE.MeshBasicMaterial({map:grassSide}),
        new THREE.MeshBasicMaterial({map:grassSide})
    ],
    new THREE.MeshBasicMaterial({map:dirt}),
    new THREE.MeshBasicMaterial({map:stone}),
    new THREE.MeshBasicMaterial({map:sand}),
    new THREE.MeshBasicMaterial({map:wood}),
    new THREE.MeshBasicMaterial({map:createTextTexture("")})
];

/* ================= INIT ================= */

init();
animate();

function init(){

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);

    camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 800);
    camera.position.copy(spawn);

    renderer = new THREE.WebGLRenderer({antialias:false});
    renderer.setSize(innerWidth,innerHeight);
    document.body.appendChild(renderer.domElement);

    /* ground */
    for(let x=0;x<16;x++){
        for(let z=0;z<16;z++){
            addBlock(x,0,z,1);
            addBlock(x,1,z,0);
        }
    }

    addSpawnBlock(); // <<< ONLY ADDITION

    document.addEventListener("keydown",e=>keys[e.code]=true);
    document.addEventListener("keyup",e=>keys[e.code]=false);

    setupControls();
    setupImport();

    window.addEventListener("resize",()=>{
        camera.aspect=innerWidth/innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth,innerHeight);
    });
}

/* ================= SPAWN BLOCK (FIXED) ================= */

function addSpawnBlock(){

    const geo = new THREE.BoxGeometry(1,1,1);
    const mat = new THREE.MeshBasicMaterial({color:0x000000});
    const mesh = new THREE.Mesh(geo,mat);

    mesh.position.set(8,1,8);
    mesh.userData.unbreakable = true;

    scene.add(mesh);
    blocks["8,1,8"] = mesh;
}

/* ================= BLOCKS ================= */

function addBlock(x,y,z,type=1,text=null){

    const key=`${x},${y},${z}`;
    if(blocks[key]) return;

    let mat = materials[type];

    if(type===5){
        mat = new THREE.MeshBasicMaterial({
            map:createTextTexture(text||"")
        });
    }

    const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(1,1,1),
        mat
    );

    mesh.position.set(x,y,z);
    mesh.userData.type=type;

    scene.add(mesh);
    blocks[key]=mesh;
}

/* ================= IMPORT ================= */

function setupImport(){

    fileInput.addEventListener("change",e=>{
        const file=e.target.files[0];
        if(!file) return;

        const reader=new FileReader();

        reader.onload=function(){
            const data=JSON.parse(reader.result);

            clearWorld();

            for(const b of data.blocks){
                addBlock(b.x,b.y,b.z,b.type,b.text);
            }

            addSpawnBlock(); // IMPORTANT FIX
        };

        reader.readAsText(file);
    });
}

function clearWorld(){
    for(const k in blocks){
        scene.remove(blocks[k]);
    }
    blocks={};
}

/* ================= CONTROLS ================= */

function setupControls(){

    const stick=document.getElementById("joystickStick");
    const base=document.getElementById("joystickBase");
    const jumpBtn=document.getElementById("jumpBtn");

    let mx=0,my=0;
    let active=false,sx=0,sy=0;

    base.addEventListener("touchstart",e=>{
        active=true;
        sx=e.touches[0].clientX;
        sy=e.touches[0].clientY;
    });

    base.addEventListener("touchmove",e=>{
        if(!active)return;

        let dx=e.touches[0].clientX-sx;
        let dy=e.touches[0].clientY-sy;

        const max=40;
        dx=Math.max(-max,Math.min(max,dx));
        dy=Math.max(-max,Math.min(max,dy));

        stick.style.transform=`translate(${dx}px,${dy}px)`;

        mx=dx/max;
        my=dy/max;
    });

    base.addEventListener("touchend",()=>{
        active=false;
        mx=my=0;
        stick.style.transform="translate(0,0)";
    });

    /* LOOK */
    let lx=0,ly=0,look=false;

    document.addEventListener("touchstart",e=>{
        if(e.target.closest("#joystickBase")||e.target.id==="jumpBtn")return;
        look=true;
        lx=e.touches[0].clientX;
        ly=e.touches[0].clientY;
    });

    document.addEventListener("touchmove",e=>{
        if(!look)return;

        let dx=e.touches[0].clientX-lx;
        let dy=e.touches[0].clientY-ly;

        yaw -= dx*0.003;
        pitch -= dy*0.003;

        pitch=Math.max(-1.5,Math.min(1.5,pitch));

        lx=e.touches[0].clientX;
        ly=e.touches[0].clientY;
    });

    document.addEventListener("touchend",()=>look=false);

    jumpBtn.addEventListener("touchstart",()=>{
        if(isGrounded()) velocity.y=JUMP;
    });

    window._mx=mx;
    window._my=my;

    setInterval(()=>{window._mx=mx;window._my=my;},16);
}

/* ================= PHYSICS ================= */

function collides(pos){
    for(const k in blocks){
        const b=blocks[k];
        if(
            Math.abs(b.position.x-pos.x)<0.6 &&
            Math.abs(b.position.y-pos.y)<1.5 &&
            Math.abs(b.position.z-pos.z)<0.6
        ) return true;
    }
    return false;
}

function isGrounded(){
    const p=camera.position.clone();
    p.y-=0.1;
    return collides(p);
}

/* ================= LOOP ================= */

function animate(){
    requestAnimationFrame(animate);

    const prev=camera.position.clone();

    camera.rotation.order="YXZ";
    camera.rotation.y=yaw;
    camera.rotation.x=pitch;

    const forward=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
    const right=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));

    const mx=window._mx||0;
    const my=window._my||0;

    camera.position.addScaledVector(forward,-my*SPEED);
    camera.position.addScaledVector(right,mx*SPEED);

    if(collides(camera.position)){
        camera.position.x=prev.x;
        camera.position.z=prev.z;
    }

    velocity.y-=GRAVITY;
    camera.position.y+=velocity.y;

    if(collides(camera.position)){
        camera.position.y=prev.y;
        velocity.y=0;
    }

    if(camera.position.y<-20){
        camera.position.copy(spawn);
        velocity.set(0,0,0);
    }

    renderer.render(scene,camera);
}

</script>

</body>
</html>
